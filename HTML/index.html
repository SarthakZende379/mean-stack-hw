<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – Antra Inc.</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header / Logo bar ── */
    header {
      width: 100%;
      background-color: #ffffff;
      border-bottom: 1px solid #ddd;
      display: flex;
      justify-content: center;
      padding: 12px 20px;
    }

    header img {
      height: 60px;
      width: auto;
    }

    /* ── Card ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
      width: 100%;
    }

    .card {
      background-color: #ffffff;
      border: 1px solid #d0d0d0;
      border-radius: 4px;
      padding: 30px 36px 36px;
      width: 100%;
      max-width: 640px;
    }

    .card h1 {
      text-align: center;
      font-size: 2rem;
      font-weight: normal;
      color: #222;
      margin-bottom: 20px;
    }

    /* ── Form ── */
    form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .form-row {
      display: flex;
      gap: 10px;
    }

    .form-row input {
      flex: 1;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 3px;
      font-size: 0.95rem;
      color: #333;
      background-color: #fafafa;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="tel"]:focus,
    input[type="password"]:focus {
      border-color: #66afe9;
      box-shadow: 0 0 6px rgba(102,175,233,0.5);
    }

    input::placeholder {
      color: #aaa;
    }

    /* ── Checkbox + disclaimer row ── */
    .agree-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-top: 4px;
    }

    .agree-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      margin-top: 3px;
      cursor: pointer;
      accent-color: #4285f4;
    }

    .agree-row label {
      font-size: 0.82rem;
      color: #555;
      line-height: 1.5;
    }

    .agree-label {
      font-size: 0.95rem;
      color: #333;
      white-space: nowrap;
      margin-top: 2px;
    }

    .disclaimer {
      font-size: 0.82rem;
      color: #555;
      line-height: 1.5;
    }

    .disclaimer a {
      color: #4285f4;
      text-decoration: none;
    }

    .disclaimer a:hover {
      text-decoration: underline;
    }

    .disclaimer .register-pill {
      display: inline-block;
      background-color: #4285f4;
      color: #fff;
      font-size: 0.75rem;
      padding: 1px 7px;
      border-radius: 3px;
      font-weight: bold;
    }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 6px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:hover {
      opacity: 0.88;
    }

    .btn-register {
      background-color: #4285f4;
      color: #ffffff;
    }

    .btn-signin {
      background-color: #34a853;
      color: #ffffff;
    }

    /* ── Footer ── */
    footer {
      width: 100%;
      text-align: center;
      font-size: 0.78rem;
      color: #666;
      padding: 16px;
      border-top: 1px solid #ddd;
      background-color: #fafafa;
      line-height: 1.7;
    }

    footer a {
      color: #4285f4;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    /* ── Responsive ── */
    @media (max-width: 500px) {
      .card {
        padding: 20px 16px 24px;
      }

      .form-row {
        flex-direction: column;
      }

      .btn-row {
        flex-direction: column;
      }

      .agree-row {
        flex-direction: column;
        gap: 6px;
      }
    }
  </style>
</head>
